<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #ede9ff;
    font-family: 'Segoe UI', Arial, sans-serif;
    position: relative;
  }

  /* ── Header ── */
  .header {
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    padding: 0 28px;
    height: 58px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .logo { font-size: 1.5rem; font-weight: 900; color: #4c1d95; letter-spacing: -0.5px; }
  .about-btn { font-size: 0.85rem; color: #374151; font-weight: 600; }
  .icon-btn {
    width: 32px; height: 32px; border-radius: 8px;
    border: 1.5px solid #e5e7eb; display: flex; align-items: center; justify-content: center;
    color: #6b7280; font-size: 0.85rem;
  }
  .bell { font-size: 1.3rem; }
  .hamburger { font-size: 1.2rem; color: #374151; font-weight: 900; letter-spacing: -1px; }

  /* ── Tabs ── */
  .tabs {
    background: #fff;
    padding: 10px 28px 0;
    display: flex; gap: 4px;
    border-bottom: 1px solid #e5e7eb;
  }
  .tab {
    padding: 10px 22px; border-radius: 12px 12px 0 0;
    font-size: 0.92rem; font-weight: 700; color: #6b7280;
    display: flex; align-items: center; gap: 6px;
  }
  .tab.active {
    background: linear-gradient(135deg, #4c1d95, #2563eb);
    color: #fff;
  }

  /* ── Filters ── */
  .filters {
    background: #fff; margin: 14px 28px; border-radius: 16px;
    padding: 14px 18px;
    box-shadow: 0 1px 6px rgba(76,29,149,0.07);
  }
  .filter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .filter-chip {
    padding: 5px 16px; border-radius: 20px; font-size: 0.78rem; font-weight: 700;
    border: 1.5px solid #e5e7eb; color: #6b7280; background: #fff;
  }
  .filter-chip.active { background: #4c1d95; color: #fff; border-color: #4c1d95; }
  .search-box {
    flex: 1; height: 34px; border-radius: 10px; border: 1.5px solid #e5e7eb;
    background: #f9f8ff; padding: 0 12px; font-size: 0.82rem; color: #9ca3af;
    display: flex; align-items: center;
  }
  .age-row { display: flex; align-items: center; gap: 10px; justify-content: flex-end; }
  .age-label { font-size: 0.78rem; color: #9ca3af; }
  .age-input {
    width: 48px; height: 30px; border-radius: 8px; border: 1.5px solid #e5e7eb;
    text-align: center; font-size: 0.78rem; color: #374151; background: #f9f8ff;
    display: flex; align-items: center; justify-content: center;
  }
  .toggle-row { display: flex; align-items: center; gap: 8px; justify-content: flex-end; margin-top: 8px; }
  .toggle-label { font-size: 0.8rem; color: #374151; font-weight: 600; }
  .toggle {
    width: 38px; height: 20px; background: #e5e7eb; border-radius: 10px;
    position: relative;
  }

  /* ── Profile Cards ── */
  .cards { display: flex; gap: 16px; padding: 0 28px; }
  .card {
    flex: 1; background: #fff; border-radius: 20px;
    box-shadow: 0 2px 16px rgba(76,29,149,0.10);
    overflow: hidden; position: relative;
  }
  .card-img {
    width: 100%; height: 200px;
    background: linear-gradient(160deg, #ddd6fe 0%, #ede9fe 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 4rem;
  }
  .card-body { padding: 14px 16px; }
  .card-name { font-size: 1.05rem; font-weight: 900; color: #1e1b4b; margin-bottom: 3px; }
  .card-city { font-size: 0.8rem; color: #6b7280; display: flex; align-items: center; gap: 4px; }
  .card-hobby {
    margin-top: 8px; display: inline-block;
    background: #ede9fe; color: #6d28d9; font-size: 0.75rem; font-weight: 700;
    padding: 3px 12px; border-radius: 20px;
  }
  .card-footer {
    padding: 10px 16px; border-top: 1px solid #f3f4f6;
    display: flex; align-items: center; justify-content: flex-end;
    gap: 6px; font-size: 0.82rem; color: #9ca3af; font-weight: 600;
  }
  .heart { font-size: 1.1rem; }

  /* ── Brand watermark ── */
  .brand-badge {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, #4c1d95, #2563eb);
    color: #fff; font-size: 0.95rem; font-weight: 900;
    padding: 7px 24px; border-radius: 20px;
    box-shadow: 0 4px 16px rgba(76,29,149,0.35);
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
</style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="bell">🔔</span>
    </div>
    <div class="header-right">
      <span class="logo">קונקשן</span>
      <span class="about-btn">About</span>
      <div class="icon-btn">⬡</div>
      <div class="icon-btn">?</div>
      <div class="icon-btn hamburger">≡</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active">🔍 מי באזור</div>
    <div class="tab">📅 אירועים</div>
    <div class="tab">👤 קונקשנז'</div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <div class="filter-row">
      <div class="filter-chip active">כל הארץ</div>
      <div class="filter-chip">100 ק"מ</div>
      <div class="filter-chip">50 ק"מ</div>
      <div class="filter-chip">25 ק"מ</div>
      <div class="filter-chip">10 ק"מ</div>
      <div style="margin-right:auto">📍</div>
    </div>
    <div class="filter-row">
      <div class="search-box">חפש לפי תחביב...</div>
      <div class="age-label">גיל</div>
      <div class="age-input">18</div>
      <div class="age-label">–</div>
      <div class="age-input">60</div>
      <div class="age-label">✕</div>
    </div>
    <div class="toggle-row">
      <span style="font-size:1rem">❤️</span>
      <span class="toggle-label">פתוח/ה לקשר רומנטי</span>
      <div class="toggle"></div>
    </div>
  </div>

  <!-- Cards -->
  <div class="cards">
    <div class="card">
      <div class="card-img">🎸</div>
      <div class="card-body">
        <div class="card-name">דן, 28</div>
        <div class="card-city">📍 תל אביב</div>
        <div class="card-hobby">🎸 גיטרה</div>
      </div>
      <div class="card-footer">
        לייק <span class="heart">🤍</span>
      </div>
    </div>
    <div class="card">
      <div class="card-img">🧘</div>
      <div class="card-body">
        <div class="card-name">שירה, 25</div>
        <div class="card-city">📍 ירושלים</div>
        <div class="card-hobby">🧘 יוגה</div>
      </div>
      <div class="card-footer">
        לייק <span class="heart">🤍</span>
      </div>
    </div>
    <div class="card">
      <div class="card-img">📸</div>
      <div class="card-body">
        <div class="card-name">עמית, 32</div>
        <div class="card-city">📍 חיפה</div>
        <div class="card-hobby">📸 צילום</div>
      </div>
      <div class="card-footer">
        לייק <span class="heart">🤍</span>
      </div>
    </div>
  </div>

  <!-- Brand badge -->
  <div class="brand-badge">קונקשן · מצא שותפים לתחביבים 🤝</div>

</body>
</html>
