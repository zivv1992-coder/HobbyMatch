<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #f0edff;
    font-family: 'Segoe UI', Arial, sans-serif;
  }

  /* ── Header ── */
  .header {
    background: #fff;
    padding: 0 40px;
    height: 90px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 2px solid #f3f0ff;
  }
  .logo {
    font-size: 2.4rem; font-weight: 900; color: #4c1d95;
    letter-spacing: -0.5px;
  }
  .pwa-btn {
    width: 56px; height: 56px; border-radius: 14px;
    background: linear-gradient(135deg, #4c1d95, #2563eb);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
  }

  /* ── Tabs ── */
  .tabs {
    background: #fff;
    padding: 0 40px;
    height: 68px;
    display: flex; align-items: flex-end; gap: 8px;
    border-bottom: 2px solid #f3f0ff;
  }
  .tab {
    padding: 12px 28px;
    border-radius: 14px 14px 0 0;
    font-size: 1.15rem; font-weight: 700; color: #9ca3af;
    display: flex; align-items: center; gap: 8px;
  }
  .tab.active {
    background: linear-gradient(135deg, #4c1d95, #2563eb);
    color: #fff;
  }

  /* ── Cards area ── */
  .cards-area {
    padding: 36px 40px;
    display: flex; gap: 28px;
    height: calc(630px - 90px - 68px);
    align-items: flex-start;
  }

  /* ── Profile card ── */
  .card {
    flex: 1; background: #fff; border-radius: 24px;
    box-shadow: 0 4px 24px rgba(76,29,149,0.10);
    overflow: hidden; height: 100%;
    display: flex; flex-direction: column;
  }
  .card-avatar {
    flex: 1;
    background: linear-gradient(160deg, #e9e3ff 0%, #f3f0ff 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .avatar-circle {
    width: 110px; height: 110px; border-radius: 50%;
    background: #c4b5fd;
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem; color: #7c3aed;
  }
  .card-body {
    padding: 20px 24px 24px;
  }
  .card-name {
    font-size: 1.5rem; font-weight: 900; color: #1e1b4b;
    margin-bottom: 8px;
  }
  .card-city {
    font-size: 1.05rem; color: #4c1d95; font-weight: 600;
    margin-bottom: 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .card-hobby {
    font-size: 1.05rem; color: #4c1d95; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
</style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="pwa-btn">🤝</div>
    <div class="logo">קונקשן</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active">מי באזור</div>
    <div class="tab">אירועים</div>
    <div class="tab">קונקשן'ז</div>
  </div>

  <!-- Cards -->
  <div class="cards-area">
    <div class="card">
      <div class="card-avatar">
        <div class="avatar-circle">👤</div>
      </div>
      <div class="card-body">
        <div class="card-name">דן, 28</div>
        <div class="card-city">📍 תל אביב</div>
        <div class="card-hobby">🎸 גיטרה</div>
      </div>
    </div>
    <div class="card">
      <div class="card-avatar">
        <div class="avatar-circle">👤</div>
      </div>
      <div class="card-body">
        <div class="card-name">שירה, 25</div>
        <div class="card-city">📍 ירושלים</div>
        <div class="card-hobby">🧘 יוגה</div>
      </div>
    </div>
  </div>

</body>
</html>
